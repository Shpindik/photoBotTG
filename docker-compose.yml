services:
  db:
    container_name: PhotoBotDB
    image: postgres:13
    env_file: .env
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    restart: always

  bot:
    build:
      context: .
      target: bot
    container_name: PhotoBot
    env_file: .env
    depends_on:
      - db
    restart: unless-stopped
    develop:
      watch:
        - action: rebuild
          path: ./bot
        - action: rebuild
          path: ./requirements.txt
        - action: rebuild
          path: ./Dockerfile

  admin_api:
    build:
      context: .
      target: admin
    container_name: PhotoBotAdminAPI
    env_file: .env
    environment:
      - ADMIN_SECRET_KEY=${ADMIN_SECRET_KEY:-changeme}
      - BOT_TOKEN=${BOT_TOKEN}
    depends_on:
      - db
    ports:
      - "8001:8000"
    restart: unless-stopped
    develop:
      watch:
        - action: rebuild
          path: ./admin_backend
        - action: rebuild
          path: ./requirements.txt
        - action: rebuild
          path: ./Dockerfile

  admin_frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8001/api
    container_name: PhotoBotAdminFrontend
    environment:
      - VITE_API_URL=http://localhost:8001/api
    ports:
      - "5173:4173"
    command: ["serve", "-s", "dist", "-l", "4173"]
    depends_on:
      - admin_api
    restart: unless-stopped
    develop:
      watch:
        - action: rebuild
          path: ./frontend/src
        - action: rebuild
          path: ./frontend/public
        - action: rebuild
          path: ./frontend/package.json
        - action: rebuild
          path: ./frontend/package-lock.json
        - action: rebuild
          path: ./frontend/Dockerfile

volumes:
  pg_data: